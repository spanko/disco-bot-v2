name: Build and Deploy Management Plane

on:
  push:
    branches: [main]
    paths:
      - 'src/ManagementPlane/**'
      - 'Dockerfile.management'
      - 'infra/management-plane.bicep'
  workflow_dispatch:

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: management-plane
  ACA_NAME: ${{ vars.MGMT_ACA_NAME }}
  RESOURCE_GROUP: ${{ vars.MGMT_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          : "${ACR_NAME:?Set ACR_NAME in repository variables}"
          : "${ACA_NAME:?Set MGMT_ACA_NAME in repository variables}"
          : "${RESOURCE_GROUP:?Set MGMT_RESOURCE_GROUP in repository variables}"

      - name: Azure Login (workload identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:${{ github.sha }} \
            --image $IMAGE_NAME:latest \
            --file Dockerfile.management \
            .

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name $ACA_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
